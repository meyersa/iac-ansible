---
- name: Configure Hosts Playbook
  hosts: all
  become: true
  tasks:
    - name: Send configure start webhook
      ansible.builtin.include_role:
        name: utility
        tasks_from: webhook
      vars:
        WEBHOOK_STATUS: success
        WEBHOOK_TITLE: "Configure started"
        WEBHOOK_DESCRIPTION: "Starting configure on {{ inventory_hostname }}"
        WEBHOOK_FIELDS:
          - name: Host
            value: "{{ inventory_hostname }}"
            inline: true
          - name: Playbook
            value: configure
            inline: true

    - name: Run configure
      block:
        - name: Run configure role
          ansible.builtin.include_role:
            name: configure

        - name: Send configure finish webhook
          ansible.builtin.include_role:
            name: utility
            tasks_from: webhook
          vars:
            WEBHOOK_STATUS: success
            WEBHOOK_TITLE: "Configure finished"
            WEBHOOK_DESCRIPTION: "Finished configure on {{ inventory_hostname }}"
            WEBHOOK_COLOR: 3066993
            WEBHOOK_FIELDS:
              - name: Host
                value: "{{ inventory_hostname }}"
                inline: true
              - name: Playbook
                value: configure
                inline: true
      rescue:
        - name: Send configure failure webhook
          ansible.builtin.include_role:
            name: utility
            tasks_from: webhook
          vars:
            WEBHOOK_STATUS: failed
            WEBHOOK_TITLE: "Configure failed"
            WEBHOOK_DESCRIPTION: "Configure failed on {{ inventory_hostname }}"
            WEBHOOK_FIELDS:
              - name: Host
                value: "{{ inventory_hostname }}"
                inline: true
              - name: Playbook
                value: configure
                inline: true
              - name: Failed task
                value: "{{ ansible_failed_task.name | default('unknown') }}"
                inline: false
              - name: Error
                value: "{{ (ansible_failed_result.msg | default(ansible_failed_result.stderr | default('unknown error'))) | truncate(900, true) }}"
                inline: false

        - name: Fail configure
          ansible.builtin.fail:
            msg: "{{ ansible_failed_result.msg | default('configure failed') }}"
