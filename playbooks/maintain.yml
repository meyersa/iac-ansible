--- 
- name: Maintain Hosts Playbook 
  hosts: all 
  become: true 
  vars: 
    REBOOT: false 
  tasks:
    - name: Send maintenance start webhook
      ansible.builtin.include_role:
        name: utility
        tasks_from: webhook
      vars:
        WEBHOOK_STATUS: success
        WEBHOOK_TITLE: "Maintenance started"
        WEBHOOK_DESCRIPTION: "Starting maintenance on {{ inventory_hostname }}"
        WEBHOOK_FIELDS:
          - name: Host
            value: "{{ inventory_hostname }}"
            inline: true
          - name: Playbook
            value: maintain
            inline: true

    - name: Run maintenance
      block:
        - name: Run maintenance role
          ansible.builtin.include_role:
            name: maintain

        - name: Send maintenance finish webhook
          ansible.builtin.include_role:
            name: utility
            tasks_from: webhook
          vars:
            WEBHOOK_STATUS: success
            WEBHOOK_TITLE: "Maintenance finished"
            WEBHOOK_DESCRIPTION: "Finished maintenance on {{ inventory_hostname }}"
            WEBHOOK_COLOR: 3066993
            WEBHOOK_FIELDS:
              - name: Host
                value: "{{ inventory_hostname }}"
                inline: true
              - name: Playbook
                value: maintain
                inline: true
              - name: Reboot requested
                value: "{{ REBOOT | bool | string }}"
                inline: true

        - name: Reboot host if requested
          ansible.builtin.command: systemctl reboot
          async: 1
          poll: 0
          changed_when: true
          when: REBOOT | bool
      rescue:
        - name: Send maintenance failure webhook
          ansible.builtin.include_role:
            name: utility
            tasks_from: webhook
          vars:
            WEBHOOK_STATUS: failed
            WEBHOOK_TITLE: "Maintenance failed"
            WEBHOOK_DESCRIPTION: "Maintenance failed on {{ inventory_hostname }}"
            WEBHOOK_FIELDS:
              - name: Host
                value: "{{ inventory_hostname }}"
                inline: true
              - name: Playbook
                value: maintain
                inline: true
              - name: Failed task
                value: "{{ ansible_failed_task.name | default('unknown') }}"
                inline: false
              - name: Error
                value: "{{ (ansible_failed_result.msg | default(ansible_failed_result.stderr | default('unknown error'))) | truncate(900, true) }}"
                inline: false

        - name: Fail maintenance
          ansible.builtin.fail:
            msg: "{{ ansible_failed_result.msg | default('maintenance failed') }}"
