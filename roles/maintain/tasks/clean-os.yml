---
- name: Clean OS 
  tags: ["clean-os"]
  block: 
    - name: Run JournalCTL Vacuum
      ansible.builtin.command: journalctl --vacuum-size 10M

    - name: Remove dependencies that are no longer required
      ansible.builtin.apt:
        autoremove: yes
        purge: true
      retries: 3 

    - name: Remove packages from local cache 
      ansible.builtin.apt:
        autoclean: yes
      retries: 3 