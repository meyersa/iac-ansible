---
- name: Deploy host
  tags: ["deploy"]
  vars:
    CD_DIR: "{{ CONFIG_DIR }}/compose"
  block:
    - name: Create Compose resources directory
      ansible.builtin.file:
        path: "{{ CD_DIR }}"
        state: directory
        owner: "{{ lookup('ansible.builtin.config', 'DEFAULT_REMOTE_USER') }}"
        group: "{{ ANSIBLE_MANAGED_GROUP }}"
        mode: "2770"

    - name: Read trusted Git directories
      ansible.builtin.command: git config --system --get-all safe.directory
      register: GIT_SAFE_DIRECTORIES
      changed_when: false
      failed_when: false

    - name: Trust Compose resources Git checkout
      ansible.builtin.command: "git config --system --add safe.directory {{ CD_DIR }}"
      when: CD_DIR not in (GIT_SAFE_DIRECTORIES.stdout_lines | default([]))

    - name: Clone IAC
      ansible.builtin.git:
        repo: "{{ DEPLOY_REPO_URL }}"
        dest: "{{ CD_DIR }}"
        version: "{{ DEPLOY_REPO_BRANCH }}"
        force: true
      register: GIT_CHECKOUT

    - name: Set Compose resources ownership
      ansible.builtin.file:
        path: "{{ CD_DIR }}"
        state: directory
        owner: "{{ lookup('ansible.builtin.config', 'DEFAULT_REMOTE_USER') }}"
        group: "{{ ANSIBLE_MANAGED_GROUP }}"
        mode: "u=rwX,g=rwX,o=rX"
        recurse: true

    - name: Find restricted Compose files
      ansible.builtin.find:
        paths: "{{ CD_DIR }}"
        patterns:
          - "*compose*"
          - "*env*"
        file_type: file
        recurse: true
        hidden: true
      register: RESTRICTED_COMPOSE_FILES

    - name: Set restricted Compose file permissions
      ansible.builtin.file:
        path: "{{ item.path }}"
        owner: "{{ lookup('ansible.builtin.config', 'DEFAULT_REMOTE_USER') }}"
        group: "{{ ANSIBLE_MANAGED_GROUP }}"
        mode: "0660"
      no_log: true
      loop: "{{ RESTRICTED_COMPOSE_FILES.files }}"

    - name: Find templates
      ansible.builtin.find:
        paths: "{{ CD_DIR }}"
        patterns: "*.j2"
        recurse: true
        hidden: true
      register: J2_FILES

    - name: Render templates
      ansible.builtin.template:
        src: "{{ item.path }}"
        dest: "{{ item.path | regex_replace('\\.j2$', '') }}"
        owner: "{{ lookup('ansible.builtin.config', 'DEFAULT_REMOTE_USER') }}"
        group: "{{ ANSIBLE_MANAGED_GROUP }}"
        mode: "0660"
        force: true
      loop: "{{ J2_FILES.files }}"
      register: RENDERED_TEMPLATES
      no_log: true

    - name: Set rendered Compose template ownership
      ansible.builtin.file:
        path: "{{ item.dest }}"
        state: file
        owner: "{{ lookup('ansible.builtin.config', 'DEFAULT_REMOTE_USER') }}"
        group: "{{ ANSIBLE_MANAGED_GROUP }}"
        mode: "{{ ((item.dest | basename) is search('env|compose')) | ternary('0660', '0664') }}"
      loop: "{{ RENDERED_TEMPLATES.results | default([]) }}"
      when: item.dest is defined
      no_log: true

    - name: Preserve Compose resources directory permissions
      ansible.builtin.file:
        path: "{{ CD_DIR }}"
        state: directory
        owner: "{{ lookup('ansible.builtin.config', 'DEFAULT_REMOTE_USER') }}"
        group: "{{ ANSIBLE_MANAGED_GROUP }}"
        mode: "2775"

    - name: Find compose projects
      ansible.builtin.find:
        paths: "{{ CD_DIR }}"
        file_type: directory
        depth: 1
      register: PROJECT_DIRS

    - name: Build project list
      ansible.builtin.set_fact:
        PROJECTS: >-
          {{
            PROJECT_DIRS.files
            | map(attribute='path')
            | map('basename')
            | reject('search', '^\\.')
            | list
          }}

    - name: Get changed files
      ansible.builtin.command:
        cmd: git diff --name-only ORIG_HEAD HEAD
        chdir: "{{ CD_DIR }}"
      register: GIT_CHANGED_FILES
      changed_when: false
      when: GIT_CHECKOUT.changed

    - name: Map changed services
      ansible.builtin.set_fact:
        CHANGED_SERVICES: >-
          {%- set OUT = [] -%}
          {%- for F in (GIT_CHANGED_FILES.stdout_lines | default([])) -%}
            {%- for P in PROJECTS -%}
              {%- if F.startswith(P ~ '/') -%}
                {%- set REST = F.split('/', 2)[1:] | join('/') -%}

                {# service folder change #}
                {%- if '/' in REST -%}
                  {%- set SVC = REST.split('/')[0] -%}
                  {%- set _ = OUT.append(P ~ ':' ~ SVC) -%}
                {%- endif -%}
              {%- endif -%}
            {%- endfor -%}
          {%- endfor -%}
          {{ OUT | unique }}

    - name: Baseline compose up (all projects)
      ansible.builtin.command:
        cmd: >
          docker compose
          -f {{ CD_DIR }}/compose.{{ item }}.yml
          up -d --remove-orphans
      loop: "{{ PROJECTS }}"
      register: BASELINE_UP

    - name: Collect baseline Compose output
      ansible.builtin.set_fact:
        BASELINE_COMPOSE_OUTPUT: >-
          {%- set OUT = [] -%}
          {%- for RESULT in (BASELINE_UP.results | default([])) -%}
            {%- set _ = OUT.append(RESULT.stdout | default('')) -%}
            {%- set _ = OUT.append(RESULT.stderr | default('')) -%}
          {%- endfor -%}
          {{ OUT | join('\n') }}

    - name: Collect changed containers from baseline
      ansible.builtin.set_fact:
        BASELINE_CHANGED_CONTAINERS: >-
          {{
            ((
                BASELINE_COMPOSE_OUTPUT
                | regex_findall('(?m)^\s*Container\s+(\S+)\s+(?:Create|Created|Creating|Recreate|Recreated|Recreating|Restart|Restarted|Restarting|Start|Started|Starting|Remove|Removed|Removing)\b')
              )
              +
              (
                BASELINE_COMPOSE_OUTPUT
                | regex_findall('(?m)^\s*(?:Creating|Recreating|Starting|Restarting|Removing)\s+(\S+)')
              ))
            | unique
            | list
          }}

    - name: Track baseline recreated containers
      ansible.builtin.set_fact:
        BASELINE_RECREATED: "{{ BASELINE_CHANGED_CONTAINERS }}"

    - name: Force recreate impacted services (excluding baseline ones)
      ansible.builtin.command:
        cmd: >
          docker compose
          -f {{ CD_DIR }}/compose.{{ item.split(':')[0] }}.yml
          up -d --force-recreate {{ item.split(':')[1] }}
      loop: "{{ CHANGED_SERVICES }}"
      register: FORCE_RECREATE
      when:
        - CHANGED_SERVICES | length > 0
        - (BASELINE_RECREATED | select('search', item.split(':')[1]) | list | length) == 0

    - name: Collect force recreate Compose output
      ansible.builtin.set_fact:
        FORCE_RECREATE_COMPOSE_OUTPUT: >-
          {%- set OUT = [] -%}
          {%- for RESULT in (FORCE_RECREATE.results | default([])) -%}
            {%- set _ = OUT.append(RESULT.stdout | default('')) -%}
            {%- set _ = OUT.append(RESULT.stderr | default('')) -%}
          {%- endfor -%}
          {{ OUT | join('\n') }}

    - name: Collect changed containers from force recreate
      ansible.builtin.set_fact:
        FORCE_RECREATED_CONTAINERS: >-
          {{
            ((
                FORCE_RECREATE_COMPOSE_OUTPUT
                | regex_findall('(?m)^\s*Container\s+(\S+)\s+(?:Create|Created|Creating|Recreate|Recreated|Recreating|Restart|Restarted|Restarting|Start|Started|Starting|Remove|Removed|Removing)\b')
              )
              +
              (
                FORCE_RECREATE_COMPOSE_OUTPUT
                | regex_findall('(?m)^\s*(?:Creating|Recreating|Starting|Restarting|Removing)\s+(\S+)')
              ))
            | unique
            | list
          }}

    - name: Publish changed containers
      ansible.builtin.set_fact:
        DEPLOY_CHANGED_CONTAINERS: "{{ ((BASELINE_CHANGED_CONTAINERS | default([])) + (FORCE_RECREATED_CONTAINERS | default([]))) | unique | list }}"
