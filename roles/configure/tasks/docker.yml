---
- name: Install Docker
  tags: ["docker"]
  block:
    - name: Add Docker's official GPG key
      ansible.builtin.apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        keyring: /etc/apt/keyrings/docker.gpg
        state: present

    - name: Get DEB architecture
      ansible.builtin.command: dpkg --print-architecture
      register: DEB_ARCHITECTURE
      changed_when: false
    - name: Add Docker repository
      ansible.builtin.apt_repository:
        repo: >-
          deb [arch={{ DEB_ARCHITECTURE.stdout }}
          signed-by=/etc/apt/keyrings/docker.gpg]
          https://download.docker.com/linux/ubuntu {{ ansible_lsb.codename }} stable
        filename: docker
        state: present

    - name: Install Docker and related packages
      ansible.builtin.apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: present
        lock_timeout: 300
    
    - name: Configure Docker Daemon
      ansible.builtin.copy:
        dest: /etc/docker/daemon.json
        owner: root
        group: root
        mode: "0644"
        content: |
          {
            "metrics-addr": "0.0.0.0:9323",
            "log-driver": "json-file",
            "log-opts": {
              "max-size": "10m",
              "max-file": "3"
            }
          }
      notify: restart docker

    - name: Add Docker group
      ansible.builtin.group:
        name: docker
        state: present

    - name: Add ansible to Docker group
      ansible.builtin.user:
        name: "{{ lookup('ansible.builtin.config', 'DEFAULT_REMOTE_USER') }}"
        groups:
          - docker
          - "{{ ANSIBLE_MANAGED_GROUP }}"
        append: true

    - name: Add alloy to Docker group
      ansible.builtin.user:
        name: "alloy"
        groups: docker
        append: true

    - name: Add generic user to Docker group
      ansible.builtin.user:
        name: "{{ BW_LOGIN_USER }}"
        groups:
          - docker
          - "{{ ANSIBLE_MANAGED_GROUP }}"
        append: true

    - name: Add login user aliases to Docker group
      ansible.builtin.user:
        name: "{{ item }}"
        groups:
          - docker
          - "{{ ANSIBLE_MANAGED_GROUP }}"
        append: true
      loop: "{{ BW_LOGIN_USER_ALIASES | default([]) }}"

    - name: Enable and start containerd
      ansible.builtin.systemd:
        name: containerd.service
        enabled: true
        state: started

    - name: Enable and start Docker
      ansible.builtin.systemd:
        name: docker.service
        enabled: true
        state: started
