---
- name: Configure local accounts
  tags: ["accounts", "access", "alloy", "ansible-pull"]
  block:
    - name: Get login user from BW
      ansible.builtin.set_fact:
        bw_DEPLOY_USER: "{{ lookup('bitwarden.secrets.lookup', DEPLOY_USER) }}"

    - name: Create Ansible managed resources group
      ansible.builtin.group:
        name: "{{ ansible_managed_group }}"
        state: present

    - name: Add Ansible user to managed resources group
      ansible.builtin.user:
        name: "{{ ansible_user }}"
        groups: "{{ ansible_managed_group }}"
        append: true

    - name: Create login user
      ansible.builtin.user:
        name: "{{ bw_DEPLOY_USER }}"
        shell: /bin/bash
        comment: "Login User"
        groups:
          - sudo
          - "{{ ansible_managed_group }}"
        append: true

    - name: Create Alloy service account
      ansible.builtin.user:
        name: alloy
        shell: /usr/sbin/nologin
        comment: "Grafana Alloy Service Account"
        system: true
        create_home: false

    - name: Create actions service account
      ansible.builtin.user:
        name: "{{ ansible_pull_actions_user }}"
        shell: /bin/bash
        comment: "Actions Service Account"
        create_home: true
        password_lock: true
